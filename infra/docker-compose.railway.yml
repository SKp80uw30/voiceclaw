# VoiceClaw — infra/docker-compose.railway.yml
# Railway production stack. Assumes Railway supplies env vars via dashboard.
#
# Usage (from repo root):
#   docker compose -f infra/docker-compose.railway.yml build

services:

  # ── Pipecat Backend ─────────────────────────────────────────────────────────
  pipecat-backend:
    build:
      context: .
      dockerfile: voice/Dockerfile
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      LLM_MODEL: ${LLM_MODEL}
      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY}
      CARTESIA_API_KEY: ${CARTESIA_API_KEY}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    expose:
      - "8000"
    healthcheck:
      test:
        - CMD
        - python3
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    init: true
    restart: unless-stopped
