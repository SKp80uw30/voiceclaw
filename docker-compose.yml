# VoiceClaw — docker-compose.yml
# SPDX-License-Identifier: MIT
#
# Local development stack. Requires a populated .env file (see .env.example).
#
# Usage:
#   docker compose up --build   # first run or after source changes
#   docker compose up           # subsequent runs (cached images)
#   docker compose down         # stop and remove containers
#
# Services:
#   pipecat-backend  — FastAPI + Pipecat voice pipeline  → http://localhost:8000

services:

  # ── Pipecat Backend ─────────────────────────────────────────────────────────
  pipecat-backend:
    build:
      context: .
      dockerfile: voice/Dockerfile
    env_file:
      - .env
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY}
      CARTESIA_API_KEY: ${CARTESIA_API_KEY}
      LLM_MODEL: ${LLM_MODEL}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "8000:8000"
    healthcheck:
      test:
        - CMD
        - python3
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    init: true
    restart: unless-stopped
